databases:
  - name: pcro-db
    plan: starter
    databaseName: pcro
    user: pcro

services:
  - type: web
    name: pcro-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run gunicorn core.wsgi:application --chdir src --bind 0.0.0.0:$PORT --workers 2 --timeout 30
    healthCheckPath: /api/health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pcro-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12"

  - type: web
    name: pcro-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        fromService:
          name: pcro-backend
          type: web
          property: host
