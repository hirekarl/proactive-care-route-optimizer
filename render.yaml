databases:
  - name: pcro-db
    plan: starter
    databaseName: pcro
    user: pcro

services:
  - type: web
    name: pcro-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run gunicorn core.wsgi:application --chdir src --bind 0.0.0.0:$PORT --workers 2 --timeout 30
    healthCheckPath: /api/health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pcro-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12"
      - key: ROUTE_API_KEY
        sync: false

  # Daily ingest: runs at 06:00 UTC (~1–2 am NYC) before dispatchers start.
  # Commands run in dependency order; a failure in any step halts the chain.
  - type: cron
    name: pcro-ingest-daily
    runtime: python
    rootDir: backend
    schedule: "0 6 * * *"
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: >-
      uv run python manage.py ingest_outages &&
      uv run python manage.py ingest_weather &&
      uv run python manage.py ingest_forecast &&
      uv run python manage.py ingest_dfta &&
      uv run python manage.py compute_risk_scores &&
      uv run python manage.py ingest_elevator_devices
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pcro-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SOCRATA_APP_TOKEN
        sync: false
      - key: DFTA_PROVIDER_DATASET_ID
        sync: false

  # Weekly purge: runs at 08:00 UTC every Sunday.
  # Deletes Route rows (and cascade RouteStop) older than 90 days.
  - type: cron
    name: pcro-purge-weekly
    runtime: python
    rootDir: backend
    schedule: "0 8 * * 0"
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run python manage.py purge_old_routes
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pcro-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12"

  - type: web
    name: pcro-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        fromService:
          name: pcro-backend
          type: web
          property: host
