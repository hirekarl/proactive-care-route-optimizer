repos:
  # Python: ruff lint + format (backend only)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # JavaScript/TypeScript: Prettier (frontend only)
  # Uses the project's own prettier install so plugins resolve correctly on all platforms.
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: system
        entry: npm run --prefix frontend format:check
        pass_filenames: false
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx, css, markdown, json, yaml]

  # Commit message: block AI co-author attribution
  - repo: local
    hooks:
      - id: no-ai-attribution
        name: Block AI co-author attribution
        language: pygrep
        entry: '(?i)co-authored-by:.*\b(claude|anthropic)\b'
        stages: [commit-msg]
        types: [text]
